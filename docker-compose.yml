services:
  postgres:
    image: postgres:17
    container_name: realmyfit_postgres_dev
    environment:
      POSTGRES_DB: realmyfit_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - realmyfit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d realmyfit_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dev_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: realmyfit_pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: root@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5051:80"
    networks:
      - dev_net

volumes:
  realmyfit_postgres_data:

networks:
  dev_net:
