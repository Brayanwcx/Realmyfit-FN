<div class="login-wrapper">
  <div class="login-container glass">
    <div class="login-header">
      <h2 class="title">Iniciar Sesión</h2>
      <p class="subtitle">Accede a tu panel en <span class="text-primary">RealMyFit</span></p>
    </div>

    <!-- Módulo de Errores -->
    @if(errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }

    <!-- Reactivity with generic HTML variables or Reactive Forms (since imports might not be resolved, simple template driven approach or plain HTML bindings) -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="tu@correo.com"
          [(ngModel)]="email" 
          required>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Tu contraseña secreta"
          [(ngModel)]="password" 
          required>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary w-100" [disabled]="!loginForm.valid || isLoading">
          @if (isLoading) {
            <span class="spinner"></span>
          } @else {
            Entrar al Gimnasio
          }
        </button>
      </div>
    </form>
    
    <div class="login-footer">
      <p>No tienes cuenta? <a routerLink="/register" class="text-primary">Registrate</a></p>
    </div>
  </div>
</div>
