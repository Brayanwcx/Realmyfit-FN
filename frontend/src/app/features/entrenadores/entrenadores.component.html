<section class="page-wrapper">
  <div class="container page-header">
    <h1 class="page-title">Entrenadores de <span class="text-primary">Élite</span></h1>
    <p class="page-subtitle">Nuestros especialistas están certificados internacionalmente para guiarte en cada paso de tu transformación.</p>
  </div>

  <div class="container trainers-grid">
    @for (coach of entrenadores; track coach.name) {
      <div class="trainer-card glass">
        <div class="trainer-photo">
          <!-- Placeholder avatar -->
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" class="avatar-icon" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        
        <div class="trainer-info">
          <h3>{{ coach.name }}</h3>
          <p class="specialty text-primary">{{ coach.spec }}</p>
          <div class="divider"></div>
          <p class="experience">Experiencia: <strong>{{ coach.exp }}</strong></p>
          
          <div class="social-links">
            <a href="#" class="social-icon">
              <!-- Instgrm SVG -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </a>
            <a href="#" class="social-icon">
              <!-- Trwttr SVG -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</section>
