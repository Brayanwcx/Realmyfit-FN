<!-- Floating Chat Button -->
<button
  class="chatbot-fab"
  [class.open]="isOpen"
  (click)="toggleChat()"
  id="chatbot-toggle"
  aria-label="Abrir chat de asistencia"
>
  <span class="fab-icon chat-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </span>
  <span class="fab-icon close-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </span>
  <span class="fab-pulse" *ngIf="hasNewMessage && !isOpen"></span>
</button>

<!-- Chat Window -->
<div class="chatbot-window" [class.open]="isOpen" id="chatbot-window">
  <!-- Header -->
  <div class="chatbot-header">
    <div class="header-info">
      <div class="bot-avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8V4H8"></path>
          <rect x="2" y="8" width="20" height="14" rx="2"></rect>
          <path d="M6 15h0"></path>
          <path d="M18 15h0"></path>
          <path d="M9 19c1 1 2.5 1 4 0"></path>
        </svg>
      </div>
      <div>
        <h4>RealMyFit Bot</h4>
        <span class="status-online">
          <span class="status-dot"></span>
          En línea
        </span>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" (click)="resetChat()" title="Reiniciar chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
      </button>
      <button class="header-btn" (click)="closeChat()" title="Cerrar chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat Body -->
  <div class="chatbot-body">
    <div class="messages-container">
      @for (message of messages; track $index) {
        <div class="message" [class.user]="message.sender === 'user'" [class.bot]="message.sender === 'bot'">
          <div class="message-bubble" [innerHTML]="formatMessage(message.text)"></div>
          <span class="message-time">{{ getTimeString(message.timestamp) }}</span>
        </div>
      }
    </div>

    <!-- Quick Replies -->
    <div class="quick-replies">
      <p class="quick-replies-label">Selecciona una opción:</p>
      <div class="quick-replies-grid">
        @for (reply of quickReplies; track reply.label) {
          <button class="quick-reply-btn" (click)="selectQuickReply(reply)">
            {{ reply.label }}
          </button>
        }
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="chatbot-footer">
    <div class="footer-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <span>Selecciona una pregunta rápida arriba</span>
    </div>
  </div>
</div>
